name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permite disparar manualmente desde la UI de GitHub
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: galleryReact/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: galleryReact

      - name: Build
        run: npm run build
        working-directory: galleryReact

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: galleryReact/dist
